<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" role="img" aria-label="Cosmic background panel">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050a1a" />
      <stop offset="52%" stop-color="#0b1a3f" />
      <stop offset="100%" stop-color="#051027" />
    </linearGradient>
    <radialGradient id="mistA" cx="24%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#7a5cff" stop-opacity="0.38" />
      <stop offset="65%" stop-color="#7a5cff" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#7a5cff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="mistB" cx="80%" cy="35%" r="68%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.34" />
      <stop offset="62%" stop-color="#00d4ff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a5cff" stop-opacity="0" />
      <stop offset="32%" stop-color="#7a5cff" stop-opacity="0.7" />
      <stop offset="62%" stop-color="#00d4ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#5cf2c1" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="1200" height="220" fill="url(#bg)" />
  <circle cx="250" cy="58" r="160" fill="url(#mistA)" />
  <circle cx="960" cy="72" r="180" fill="url(#mistB)" />

  <g fill="#ffffff" opacity="0.8">
    <circle cx="72" cy="28" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.8s" repeatCount="indefinite" /></circle>
    <circle cx="182" cy="62" r="1.2"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4.4s" repeatCount="indefinite" /></circle>
    <circle cx="312" cy="36" r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.9s" repeatCount="indefinite" /></circle>
    <circle cx="446" cy="72" r="1.4"><animate attributeName="opacity" values="0.2;0.95;0.2" dur="3.5s" repeatCount="indefinite" /></circle>
    <circle cx="590" cy="40" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="5.2s" repeatCount="indefinite" /></circle>
    <circle cx="732" cy="68" r="1.5"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4.1s" repeatCount="indefinite" /></circle>
    <circle cx="872" cy="30" r="1.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.9s" repeatCount="indefinite" /></circle>
    <circle cx="1012" cy="70" r="1.4"><animate attributeName="opacity" values="0.2;0.85;0.2" dur="4.7s" repeatCount="indefinite" /></circle>
    <circle cx="1146" cy="40" r="1.7"><animate attributeName="opacity" values="0.2;1;0.2" dur="5.0s" repeatCount="indefinite" /></circle>
  </g>

  <rect x="70" y="106" width="1060" height="70" rx="18" fill="#ffffff" fill-opacity="0.07" />
  <path d="M0 150 C 180 122, 390 194, 600 152 C 810 110, 1020 194, 1200 148" stroke="url(#line)" stroke-width="2.2" fill="none">
    <animate attributeName="d" dur="8.2s" repeatCount="indefinite"
      values="
      M0 150 C 180 122, 390 194, 600 152 C 810 110, 1020 194, 1200 148;
      M0 156 C 180 194, 390 120, 600 158 C 810 194, 1020 120, 1200 152;
      M0 150 C 180 122, 390 194, 600 152 C 810 110, 1020 194, 1200 148" />
  </path>
</svg>
