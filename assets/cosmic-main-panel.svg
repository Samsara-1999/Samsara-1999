<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 980" role="img" aria-label="Cosmic main panel">
  <defs>
    <linearGradient id="space" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040915" />
      <stop offset="45%" stop-color="#0a1738" />
      <stop offset="100%" stop-color="#061127" />
    </linearGradient>

    <radialGradient id="nebulaL" cx="18%" cy="16%" r="65%">
      <stop offset="0%" stop-color="#7a5cff" stop-opacity="0.48" />
      <stop offset="62%" stop-color="#7a5cff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#7a5cff" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="nebulaR" cx="85%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.45" />
      <stop offset="62%" stop-color="#00d4ff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="cardStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06" />
    </linearGradient>

    <linearGradient id="titleLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a5cff" />
      <stop offset="55%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#5cf2c1" />
    </linearGradient>

    <filter id="blurBig">
      <feGaussianBlur stdDeviation="22" />
    </filter>
  </defs>

  <rect width="1200" height="980" fill="url(#space)" />

  <g filter="url(#blurBig)">
    <circle cx="220" cy="140" r="220" fill="url(#nebulaL)" />
    <circle cx="980" cy="180" r="250" fill="url(#nebulaR)" />
  </g>

  <g fill="#ffffff" opacity="0.8">
    <circle cx="72" cy="42" r="1.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.2s" repeatCount="indefinite" /></circle>
    <circle cx="188" cy="86" r="1.4"><animate attributeName="opacity" values="0.2;0.92;0.2" dur="3.7s" repeatCount="indefinite" /></circle>
    <circle cx="322" cy="58" r="1.7"><animate attributeName="opacity" values="0.2;1;0.2" dur="5.0s" repeatCount="indefinite" /></circle>
    <circle cx="468" cy="104" r="1.5"><animate attributeName="opacity" values="0.2;0.95;0.2" dur="4.6s" repeatCount="indefinite" /></circle>
    <circle cx="606" cy="66" r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.0s" repeatCount="indefinite" /></circle>
    <circle cx="742" cy="108" r="1.5"><animate attributeName="opacity" values="0.2;0.88;0.2" dur="4.9s" repeatCount="indefinite" /></circle>
    <circle cx="888" cy="62" r="1.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.8s" repeatCount="indefinite" /></circle>
    <circle cx="1038" cy="98" r="1.4"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="5.4s" repeatCount="indefinite" /></circle>
    <circle cx="1134" cy="50" r="1.9"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.3s" repeatCount="indefinite" /></circle>
  </g>

  <line x1="1030" y1="52" x2="928" y2="136" stroke="#ffffff" stroke-opacity="0.7" stroke-width="1.2">
    <animate attributeName="opacity" values="0;0.92;0" dur="6s" repeatCount="indefinite" />
    <animate attributeName="x1" values="1030;998;1030" dur="6s" repeatCount="indefinite" />
    <animate attributeName="x2" values="928;896;928" dur="6s" repeatCount="indefinite" />
  </line>

  <g transform="translate(82 82)">
    <rect width="1036" height="816" rx="28" fill="#ffffff" fill-opacity="0.06" stroke="url(#cardStroke)" stroke-width="1.2" />

    <rect x="34" y="34" width="968" height="126" rx="20" fill="#ffffff" fill-opacity="0.08" stroke="url(#cardStroke)" />
    <polygon points="72,78 80,96 100,98 85,111 90,130 72,120 54,130 59,111 44,98 64,96" fill="#9fdfff" />
    <text x="126" y="86" fill="#ffffff" font-size="34" font-weight="700" font-family="Segoe UI, Arial, sans-serif">COSMIC PROFILE</text>
    <text x="126" y="121" fill="#cde4ff" font-size="20" font-family="Segoe UI, Arial, sans-serif">Samsara | Direct PhD in China | Vision Language Models</text>
    <text x="126" y="148" fill="#9fb7d5" font-size="15" font-family="Consolas, Monaco, monospace">Architecture Design  •  PEFT  •  Efficient Multimodal Systems</text>

    <rect x="34" y="184" width="472" height="184" rx="20" fill="#ffffff" fill-opacity="0.08" stroke="url(#cardStroke)" />
    <circle cx="84" cy="236" r="18" fill="none" stroke="#bcb6ff" stroke-width="2" />
    <circle cx="84" cy="236" r="6" fill="#bcb6ff" />
    <ellipse cx="84" cy="236" rx="30" ry="12" fill="none" stroke="#bcb6ff" stroke-width="1.5" />
    <text x="122" y="232" fill="#ffffff" font-size="24" font-weight="700" font-family="Segoe UI, Arial, sans-serif">RESEARCH CORE</text>
    <text x="62" y="268" fill="#cde4ff" font-size="17" font-family="Segoe UI, Arial, sans-serif">• VLM architecture exploration</text>
    <text x="62" y="296" fill="#cde4ff" font-size="17" font-family="Segoe UI, Arial, sans-serif">• Parameter-efficient fine-tuning</text>
    <text x="62" y="324" fill="#cde4ff" font-size="17" font-family="Segoe UI, Arial, sans-serif">• Throughput and inference efficiency</text>
    <text x="62" y="351" fill="#9fb7d5" font-size="14" font-family="Consolas, Monaco, monospace">Ship ideas that can survive real workloads.</text>

    <rect x="530" y="184" width="472" height="184" rx="20" fill="#ffffff" fill-opacity="0.08" stroke="url(#cardStroke)" />
    <rect x="566" y="216" width="38" height="26" rx="5" fill="none" stroke="#7ff3d4" stroke-width="2" />
    <line x1="572" y1="223" x2="598" y2="223" stroke="#7ff3d4" stroke-width="1.8" />
    <line x1="572" y1="230" x2="590" y2="230" stroke="#7ff3d4" stroke-width="1.8" />
    <circle cx="579" cy="249" r="3.2" fill="#7ff3d4" />
    <circle cx="591" cy="249" r="3.2" fill="#7ff3d4" />
    <text x="620" y="232" fill="#ffffff" font-size="24" font-weight="700" font-family="Segoe UI, Arial, sans-serif">SYSTEMS OPS</text>
    <text x="558" y="268" fill="#cde4ff" font-size="17" font-family="Segoe UI, Arial, sans-serif">• Cluster administration and stability</text>
    <text x="558" y="296" fill="#cde4ff" font-size="17" font-family="Segoe UI, Arial, sans-serif">• Automation for repetitive operations</text>
    <text x="558" y="324" fill="#cde4ff" font-size="17" font-family="Segoe UI, Arial, sans-serif">• Practical infra tooling for team velocity</text>
    <text x="558" y="351" fill="#9fb7d5" font-size="14" font-family="Consolas, Monaco, monospace">Reliability first, then scale.</text>

    <rect x="34" y="392" width="968" height="194" rx="20" fill="#ffffff" fill-opacity="0.08" stroke="url(#cardStroke)" />
    <path d="M72 446 h30 a8 8 0 0 1 8 8 v16 a8 8 0 0 1 -8 8 h-30 a8 8 0 0 1 -8 -8 v-16 a8 8 0 0 1 8 -8z" fill="none" stroke="#9fe7ff" stroke-width="2"/>
    <circle cx="78" cy="462" r="3.5" fill="#9fe7ff" />
    <circle cx="96" cy="462" r="3.5" fill="#9fe7ff" />
    <line x1="87" y1="478" x2="87" y2="488" stroke="#9fe7ff" stroke-width="2" />
    <text x="126" y="458" fill="#ffffff" font-size="24" font-weight="700" font-family="Segoe UI, Arial, sans-serif">BEYOND WORK</text>
    <text x="126" y="486" fill="#cde4ff" font-size="17" font-family="Segoe UI, Arial, sans-serif">• Mystery and thriller films</text>
    <text x="126" y="514" fill="#cde4ff" font-size="17" font-family="Segoe UI, Arial, sans-serif">• Board games and strategy games</text>
    <text x="126" y="542" fill="#cde4ff" font-size="17" font-family="Segoe UI, Arial, sans-serif">• Fitness and strength training</text>
    <text x="126" y="570" fill="#9fb7d5" font-size="14" font-family="Consolas, Monaco, monospace">Keep body and mind in sync with research pace.</text>

    <rect x="34" y="610" width="968" height="172" rx="20" fill="#ffffff" fill-opacity="0.08" stroke="url(#cardStroke)" />
    <path d="M66 665 h44 a8 8 0 0 1 8 8 v24 a8 8 0 0 1 -8 8 h-44 a8 8 0 0 1 -8 -8 v-24 a8 8 0 0 1 8 -8z" fill="none" stroke="#b2beff" stroke-width="2"/>
    <path d="M58 673 l30 22 l30 -22" fill="none" stroke="#b2beff" stroke-width="2"/>
    <text x="126" y="666" fill="#ffffff" font-size="24" font-weight="700" font-family="Segoe UI, Arial, sans-serif">CONTACT CHANNEL</text>
    <text x="126" y="696" fill="#cde4ff" font-size="17" font-family="Segoe UI, Arial, sans-serif">GitHub: @Samsara-1999</text>
    <text x="126" y="724" fill="#cde4ff" font-size="17" font-family="Segoe UI, Arial, sans-serif">Topics: VLMs, Multimodal Architecture, PEFT, Infra Engineering</text>
    <text x="126" y="752" fill="#9fb7d5" font-size="14" font-family="Consolas, Monaco, monospace">Open to research collaboration and engineering opportunities.</text>
  </g>

  <rect x="118" y="200" width="964" height="4" rx="2" fill="url(#titleLine)" opacity="0.85" />
</svg>
