<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 150" role="img" aria-label="Cosmic divider">
  <defs>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a5cff" stop-opacity="0" />
      <stop offset="25%" stop-color="#7a5cff" stop-opacity="0.8" />
      <stop offset="55%" stop-color="#00d4ff" stop-opacity="0.85" />
      <stop offset="85%" stop-color="#5cf2c1" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#5cf2c1" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="1200" height="150" fill="none" />

  <path
    id="orbit"
    d="M0 88 C 180 30, 390 132, 600 80 C 810 26, 1020 132, 1200 74"
    stroke="url(#trail)"
    stroke-width="5.2"
    fill="none">
    <animate
      attributeName="d"
      dur="6s"
      repeatCount="indefinite"
      values="
        M0 88 C 180 30, 390 132, 600 80 C 810 26, 1020 132, 1200 74;
        M0 78 C 180 132, 390 30, 600 86 C 810 132, 1020 30, 1200 84;
        M0 88 C 180 30, 390 132, 600 80 C 810 26, 1020 132, 1200 74" />
  </path>

  <circle r="5.5" fill="#ffffff" opacity="0.9">
    <animateMotion dur="3.8s" repeatCount="indefinite">
      <mpath href="#orbit" />
    </animateMotion>
  </circle>

  <circle r="3.8" fill="#d2f4ff" opacity="0.75">
    <animateMotion dur="6.1s" repeatCount="indefinite" begin="-1.5s">
      <mpath href="#orbit" />
    </animateMotion>
  </circle>
</svg>
